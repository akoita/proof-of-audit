name: Release Images

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: GCP project that owns the Artifact Registry repository
        required: true
        type: string
      artifact_registry_region:
        description: Artifact Registry region
        required: true
        default: us-central1
        type: string
      artifact_registry_repository:
        description: Artifact Registry repository name
        required: true
        default: proof-of-audit
        type: string
      release_channel:
        description: Environment tag to publish for infra
        required: true
        type: choice
        options:
          - testnet-candidate
          - mainnet-release
      web_api_base_url:
        description: Public API base URL baked into NEXT_PUBLIC_PROOF_OF_AUDIT_API_URL
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-images-${{ inputs.release_channel }}
  cancel-in-progress: false

jobs:
  publish-runtime-images:
    runs-on: ubuntu-latest
    env:
      REGISTRY_HOST: ${{ inputs.artifact_registry_region }}-docker.pkg.dev
      REGISTRY_PATH: ${{ inputs.artifact_registry_region }}-docker.pkg.dev/${{ inputs.gcp_project_id }}/${{ inputs.artifact_registry_repository }}
      RELEASE_CHANNEL: ${{ inputs.release_channel }}
      API_IMAGE_NAME: proof-of-audit-api
      WEB_IMAGE_NAME: proof-of-audit-web
      EVIDENCE_RUNNER_IMAGE_NAME: proof-of-audit-evidence-runner
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGISTRY_HOST" --quiet

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_PATH }}/${{ env.API_IMAGE_NAME }}:${{ env.RELEASE_CHANNEL }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_PROOF_OF_AUDIT_API_URL=${{ inputs.web_api_base_url }}
          tags: ${{ env.REGISTRY_PATH }}/${{ env.WEB_IMAGE_NAME }}:${{ env.RELEASE_CHANNEL }}

      - name: Build and push evidence-runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/evidence-runner/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_PATH }}/${{ env.EVIDENCE_RUNNER_IMAGE_NAME }}:${{ env.RELEASE_CHANNEL }}

      - name: Write release summary
        run: |
          {
            echo "## Published runtime images"
            echo
            echo "- \`${REGISTRY_PATH}/${API_IMAGE_NAME}:${RELEASE_CHANNEL}\`"
            echo "- \`${REGISTRY_PATH}/${WEB_IMAGE_NAME}:${RELEASE_CHANNEL}\`"
            echo "- \`${REGISTRY_PATH}/${EVIDENCE_RUNNER_IMAGE_NAME}:${RELEASE_CHANNEL}\`"
          } >> "$GITHUB_STEP_SUMMARY"
