name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: python -m pip install setuptools wheel && python -m pip install --no-build-isolation -e '.[dev]'
      - name: Build contract artifacts for Python integration tests
        run: forge build --root contracts
      - name: Run Python tests
        run: make test-python

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Run Foundry tests
        run: forge test --root contracts

  system-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: python -m pip install setuptools wheel && python -m pip install --no-build-isolation -e '.[dev]'
      - name: Ensure system e2e scripts are executable
        run: chmod +x scripts/run-system-e2e-stack.sh scripts/start-anvil.sh scripts/deploy-local.sh scripts/deploy-demo-fixtures.sh
      - name: Run system end-to-end tests
        run: PYTHON_BIN=python make test-system-e2e

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web app
        run: NEXT_PUBLIC_PROOF_OF_AUDIT_API_URL=http://127.0.0.1:8080 pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install API dependencies
        run: python -m pip install setuptools wheel && python -m pip install --no-build-isolation -e '.[dev]'
      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: Ensure e2e scripts are executable
        run: chmod +x scripts/run-e2e-stack.sh scripts/start-anvil.sh scripts/deploy-local.sh scripts/deploy-demo-fixtures.sh
      - name: Run UI end-to-end tests
        run: PYTHON_BIN=python make test-ui-e2e
